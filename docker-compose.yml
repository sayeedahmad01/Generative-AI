version: "3.9"

services:
  mongo:
    container_name: sayeed-mongo
    image: mongo:latest
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: sayeedahmad01
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: sayeed_db
    volumes:
      - ./sayeed_data:/data/db
    networks:
      - sayeed-network

  mongo_client:
    container_name: sayeed-mongo-client
    image: mongo:latest
    depends_on:
      - mongo
    command: >
      mongo --host mongo
      -u sayeedahmad01
      -p password
      --eval "
      db.getSiblingDB('sayeed_db').createUser({
      user:'readonly',
      pwd:'password',
      roles:[{role:'read',db:'sayeed_db'}]
      });"
    networks:
      - sayeed-network

  omniboard_readonly:
    container_name: sayeed-omniboard-readonly
    build: https://github.com/sayeedahmad01/omniboard.git
    command:
      - "--mu"
      - "mongodb://readonly:password@mongo:27017/sayeed_db"
    ports:
      - "8081:9000"
    depends_on:
      - mongo
    networks:
      - sayeed-network

  omniboard:
    container_name: sayeed-omniboard
    build: https://github.com/sayeedahmad01/omniboard.git
    command:
      - "--mu"
      - "mongodb://sayeedahmad01:password@mongo:27017/sayeed_db?authSource=admin"
    depends_on:
      - mongo
    networks:
      - sayeed-network

  nginx:
    container_name: sayeed-nginx
    image: dhswt/nginx-basic-auth:1.3
    environment:
      HTPASSWD: "sayeedahmad01:password"
      FORWARD_HOST: omniboard
      FORWARD_PORT: 9000
    depends_on:
      - omniboard
    ports:
      - "8080:80"
    networks:
      - sayeed-network

networks:
  sayeed-network:
    driver: bridge
